name: Medical Image Dataset Monitor

on:
  schedule:
    # ┌───────── minute (0-59)
    # │ ┌─────── hour (0-23)
    # │ │ ┌───── day of month (1-31)
    # │ │ │ ┌─── month (1-12)
    # │ │ │ │ ┌─ day of week (0-6, Sun=0)
    # │ │ │ │ │
    - cron: "0 6 * * *" # Every day at 06:00 UTC

  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # Needed to commit the updated database back

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitoring agent
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated database
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datasets_state.db
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update dataset state database [skip ci]"
          git push
